name: Docker Build & Push

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/docker-build-push.yml'
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      REPO: ${{ github.repository }}
      REPO_LC: ${{ github.repository.lower }}
      MONOLITH_IMAGE_NAME: ghcr.io/${{ github.repository.lower }}/monolith
      MOVIES_SERVICE_IMAGE_NAME: ghcr.io/${{ github.repository.lower }}/movies-service
      EVENTS_SERVICE_IMAGE_NAME: ghcr.io/${{ github.repository.lower }}/events-service
      PROXY_SERVICE_IMAGE_NAME: ghcr.io/${{ github.repository.lower }}/proxy-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push proxy-service
        uses: docker/build-push-action@v5
        with:
          context: ./src/microservices/proxy
          push: true
          tags: ${{ env.PROXY_SERVICE_IMAGE_NAME }}:latest

      - name: Build and push events-service
        uses: docker/build-push-action@v5
        with:
          context: ./src/microservices/events
          push: true
          tags: ${{ env.EVENTS_SERVICE_IMAGE_NAME }}:latest

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies for API tests
        working-directory: tests/postman
        run: npm install

      - name: Run API tests
        working-directory: tests/postman
        run: npm run test:local
