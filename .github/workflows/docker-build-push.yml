name: Docker Build & Push

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/docker-build-push.yml'
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set repo name in lowercase
        id: repo
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push proxy-service
        uses: docker/build-push-action@v5
        with:
          context: ./src/microservices/proxy
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.repo_lc }}/proxy-service:latest

      - name: Build and push events-service
        uses: docker/build-push-action@v5
        with:
          context: ./src/microservices/events
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.repo_lc }}/events-service:latest

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies for API tests
        working-directory: tests/postman
        run: npm install

      - name: Run API tests
        working-directory: tests/postman
        run: npm run test:local
