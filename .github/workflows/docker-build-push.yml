name: Docker Build & Push

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/docker-build-push.yml'
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push proxy-service
        uses: docker/build-push-action@v5
        with:
          context: ./src/microservices/proxy
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/proxy-service:latest

      - name: Build and push events-service
        uses: docker/build-push-action@v5
        with:
          context: ./src/microservices/events
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/events-service:latest

      - name: Build and push movies-service
        uses: docker/build-push-action@v5
        with:
          context: ./src/microservices/movies
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/movies-service:latest

      - name: Build and push monolith
        uses: docker/build-push-action@v5
        with:
          context: ./src/monolith
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/monolith:latest

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies for API tests
        working-directory: tests/postman
        run: npm install

      - name: Start services for tests
        run: docker-compose -f docker-compose.yml up -d

      - name: Wait for containers to be healthy
        run: sleep 25

      - name: Run API tests
        working-directory: tests/postman
        run: npm run test:local

      - name: Stop and clean up containers
        run: docker-compose -f docker-compose.yml down
